{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Wholesale Settlement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'portal/css/custom.css' %}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-card-header">
            <img src="{% static 'portal/img/logo.png' %}" alt="Company Logo"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div style="display:none; width:48px; height:48px; background:#00205B; border-radius:10px; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1.2rem; margin:0 auto 12px;">SC</div>
            <h1 class="login-card-title">Welcome back</h1>
            <p class="login-card-subtitle">Sign in to the Wholesale Settlement Portal</p>
        </div>
        <div class="login-card-body">
            {% if error %}
            <div class="login-alert">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
        <div class="login-card-footer">
            <small>Demo Environment &mdash; Southern Company</small>
        </div>
    </div>
</body>
</html>
