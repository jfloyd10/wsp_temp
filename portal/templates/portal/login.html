{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Wholesale Settlement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'portal/css/custom.css' %}" rel="stylesheet">
</head>
<body class="login-body">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card login-card shadow">
            <div class="card-header text-center login-header py-4">
                <i class="bi bi-lightning-charge-fill fs-1 text-white"></i>
                <h4 class="text-white mb-0 mt-2">Southern Company</h4>
                <small class="text-white-50">Wholesale Settlement Portal</small>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger py-2">{{ error }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-brand w-100">Sign In</button>
                </form>
            </div>
            <div class="card-footer text-center text-muted py-3">
                <small>Demo Environment</small>
            </div>
        </div>
    </div>
</body>
</html>
