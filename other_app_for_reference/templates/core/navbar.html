{% load static %}
{% block navbar %}

<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
    <!-- NOTE: added *relative* so we can absolutely center the nav -->
    <div class="relative flex items-center justify-between py-3 px-4">
        <!-- Logo (unchanged) -->
        <img src="{% static 'img/sclogo.png' %}" alt="Southern Company"
             class="ml-3 h-7 object-contain sm:inline" style="height:35px;">

        <!-- =====  CENTERED DESKTOP NAV  =====
             * moved out of normal flex flow by making it absolute & centering
        -->
        <div class="hidden md:flex items-center space-x-2 md:absolute md:left-1/2 md:-translate-x-1/2">

            <a href="{% url 'app:index' %}"
            class="nav-btn {{selected_navbar.dash}} flex items-center px-4 py-2 rounded-lg font-medium hover:bg-transparent">
            <i data-feather="home" class="mr-2 h-4 w-4"></i><span>Dash</span>
            </a>

            <a href="{% url 'app:trading_analytics' %}"
            class="nav-btn {{selected_navbar.analysis}} flex items-center px-4 py-2 rounded-lg font-medium hover:bg-transparent">
            <i data-feather="bar-chart-2" class="mr-2 h-4 w-4"></i><span>Trading&nbsp;Analytics</span>
            </a>

            <a href="{% url 'app:statement_history' %}"
            class="nav-btn {{selected_navbar.statements}} flex items-center px-4 py-2 rounded-lg font-medium hover:bg-transparent">
            <i data-feather="file-text" class="mr-2 h-4 w-4"></i><span>Statements</span>
            </a>
            
        </div>
        <!-- Right‑side controls (unchanged) -->
        <div class="flex items-center space-x-4">
            <!-- Application Name -->
            <h1 class="hidden md:block text-sm font-medium text-gray-700 mr-4">
                Wholesale Customer Service Platform
            </h1>

            <div class="hidden md:flex items-center">
                <div class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center shadow-inner">
                    <i data-feather="user"></i>
                </div>
                <span class="ml-2 font-medium">Josh</span>
                <i data-feather="chevron-down" class="ml-1 text-gray-500"></i>
            </div>

            <div class="hidden md:block relative dropdown-toggle">
                <button id="userMenuBtn"
                        class="p-2 rounded-full hover:bg-gray-100 transition-colors duration-200">
                    <i data-feather="more-vertical"></i>
                </button>
                <div id="userMenuDropdown" class="dropdown-menu w-48 right-0">
                    <button
                        class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center transition-colors duration-200">
                        <i data-feather="settings" class="mr-2 h-4 w-4"></i><span>Settings</span>
                    </button>
                    <button
                        class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 flex items-center text-[#EC1C24] transition-colors duration-200">
                        <i data-feather="log-out" class="mr-2 h-4 w-4"></i><span>Logout</span>
                    </button>
                </div>
            </div>

            <button id="openMobileMenu"
                    class="inline-flex md:hidden items-center p-2 rounded-full hover:bg-gray-100 transition-colors duration-200">
                <i data-feather="menu"></i>
            </button>
        </div>
    </div>
</header>

{% endblock %}
